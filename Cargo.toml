[workspace]
members = ["apps/server", "crates/engine"]
resolver = "3"

[workspace.package]
version = "0.1.0"
authors = ["chainyo"]
edition = "2024"
rust-version = "1.95"
license = "MIT"
repository = "https://github.com/chainyo/word-arena"

[workspace.dependencies]
axum = "0.8.9"
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.53.0", features = ["macros", "net", "rt-multi-thread", "signal"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "fmt"] }

[workspace.lints.rust]
missing_debug_implementations = "warn"
unsafe_code = "forbid"

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
