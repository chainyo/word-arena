schema_version = 1
id = "es-standard-filter"
version = 1
pack_id = "word-arena-es-v1"
locale = "es"
source_id = "wooorm-dictionary-es-4.0.0"
source_revision = "8cfea406b505e4d7df52d5a19bce525df98c54ab"
source_archive_sha256 = "1ce550ad1d03e03a11b16c81ee5edc31cf5792578dbe5926a403bf0ffba0a443"
source_archive_size_bytes = 54341879
source_archive_root = "dictionaries-8cfea406b505e4d7df52d5a19bce525df98c54ab"
source_dictionary_path = "dictionaries/es/index.dic"
source_affix_path = "dictionaries/es/index.aff"
source_encoding = "utf-8"
normalization_profile = "es-basic-latin-fold-v1"
alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
min_word_length = 2
max_word_length = 15
review_file = "reviews/es-v1.toml"

included_forms = [
  "single-token common words",
  "standard Spanish spellings from the es_ES source profile",
  "inflected noun, adjective, and verb forms generated by the pinned Hunspell affix rules",
  "feminine and plural forms present in or generated by the approved source",
]
excluded_forms = [
  "proper names",
  "abbreviations",
  "hyphenated or whitespace-containing forms",
  "tokens outside the physical board alphabet after normalization",
  "forms longer than the 15-square board",
]

[review_requirement]
status = "required-before-import"
qualification = "native or professionally fluent Spanish speaker"
scope = "inclusion, exclusion, inflection, diacritic folding, digraph handling, and physical tile fixtures"
evidence_required = ["reviewer identity", "review date", "decision", "rationale", "source-policy linkage"]
